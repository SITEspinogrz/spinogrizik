<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spinogrizik Network</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        /* === ПЕРЕМЕННЫЕ И ОСНОВА === */
        :root { 
            --glass: rgba(20, 20, 20, 0.45); 
            --glass-border: rgba(255, 255, 255, 0.1); 
            --accent: #6c5ce7; 
            --accent-hover: #8172fa; 
            --bg-dark: rgba(0,0,0,0.4);
            --text-main: #f8f9fa;
            --text-muted: #adb5bd;
        }
        
        body { 
            margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; 
            background: url('https://img.freepik.com/free-vector/wave-dark-gradient-background-desogn_343694-4095.jpg') no-repeat center center fixed; 
            background-size: cover; color: var(--text-main); min-height: 100dvh; 
            display: flex; flex-direction: column; -webkit-tap-highlight-color: transparent; 
        }

        /* === АНИМАЦИИ === */
        @keyframes fadeScaleUp {
            0% { opacity: 0; transform: translateY(15px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* === НАВИГАЦИЯ === */
        nav { 
            background: rgba(10,10,10,0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--glass-border); 
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }
        .logo { font-size: 1.5em; font-weight: 800; cursor: pointer; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        
        /* === СТРАНИЦЫ И КАРТОЧКИ === */
        .page { display: none; padding: 20px 15px; flex: 1; max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .page.active { display: block; animation: fadeScaleUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .card { 
            background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            padding: 20px; margin-bottom: 20px; border-radius: 20px; 
            border: 1px solid var(--glass-border); box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .mini-card { cursor: pointer; transition: all 0.3s ease; padding: 18px; }
        .mini-card:hover { background: rgba(255,255,255,0.08); transform: translateY(-4px); border-color: rgba(255,255,255,0.2); }
        
        /* === ТИПОГРАФИКА И ТЕГИ === */
        .tag { font-size: 0.75em; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 12px; font-weight: 500; border: 1px solid rgba(255,255,255,0.05); }
        .meta-info { font-size: 0.85em; color: var(--text-muted); display: flex; gap: 15px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
        .user-link { color: var(--text-main); font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 5px; transition: color 0.2s; }
        .user-link:hover { color: var(--accent); }

        /* === ФОРМЫ === */
        input, textarea { 
            width: 100%; padding: 15px; margin: 8px 0 16px 0; border-radius: 14px; 
            border: 1px solid rgba(255,255,255,0.1); background: var(--bg-dark); 
            color: white; box-sizing: border-box; font-family: inherit; font-size: 16px; /* 16px предотвращает зум на iOS */
            transition: all 0.3s; 
        }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); background: rgba(0,0,0,0.6); box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.2); }
        
        /* === КНОПКИ === */
        button { 
            background: var(--accent); color: white; padding: 14px 20px; border: none; 
            border-radius: 14px; cursor: pointer; font-weight: 600; font-size: 16px; 
            transition: all 0.2s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:hover { background: var(--accent-hover); transform: translateY(-2px); }
        button:active { transform: scale(0.98); }
        
        .btn-small { width: auto; padding: 10px 16px; font-size: 14px; }
        .btn-outline { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); }
        .btn-outline:hover { background: rgba(255,255,255,0.1); }
        .btn-danger { background: rgba(231, 76, 60, 0.2); border: 1px solid rgba(231, 76, 60, 0.5); color: #ff7675; }
        .btn-danger:hover { background: rgba(231, 76, 60, 0.4); }

        /* === ИКОНКИ (SVG) === */
        .icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .icon-sm { width: 14px; height: 14px; }

        /* === СОРТИРОВКА === */
        .sort-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .sort-tabs::-webkit-scrollbar { display: none; }
        .sort-tab { background: rgba(255,255,255,0.05); padding: 10px 18px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.9em; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 6px; }
        .sort-tab.active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); font-weight: 600; }

        /* === ПРОМПТ ВНУТРИ === */
        .prompt-box { position: relative; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 16px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.05); }
        .prompt-text { white-space: pre-wrap; margin: 0; font-family: monospace; font-size: 14px; line-height: 1.6; color: #e2e8f0; }
        .copy-btn { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); width: auto; padding: 6px 12px; font-size: 12px; border-radius: 8px; }
        .post-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.1); }
        
        .actions-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .action-btn { background: rgba(255,255,255,0.05); width: auto; padding: 10px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); }
        .action-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        .action-btn.active { background: rgba(108, 92, 231, 0.2); border-color: var(--accent); color: white; }

        /* === КОММЕНТАРИИ === */
        .comments-list { margin-top: 25px; border-top: 1px solid var(--glass-border); padding-top: 20px; }
        .comment { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 14px; margin-bottom: 12px; font-size: 0.9em; border: 1px solid rgba(255,255,255,0.05); }
        
        /* === УВЕДОМЛЕНИЯ === */
        .toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: rgba(20,20,20,0.9); backdrop-filter: blur(10px); color: white; padding: 12px 24px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); font-weight: 500; font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; display: flex; align-items: center; gap: 10px; }
        .toast.show { bottom: 30px; }
        
        .header-back { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; cursor: pointer; color: var(--text-muted); font-weight: 600; width: fit-content; transition: 0.2s; }
        .header-back:hover { color: white; }
    </style>
</head>
<body>

<!-- Иконки SVG (Скрытый блок) -->
<svg style="display: none;">
    <symbol id="icon-home" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></symbol>
    <symbol id="icon-user" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></symbol>
    <symbol id="icon-heart" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></symbol>
    <symbol id="icon-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></symbol>
    <symbol id="icon-star" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></symbol>
    <symbol id="icon-edit" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></symbol>
    <symbol id="icon-back" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></symbol>
    <symbol id="icon-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></symbol>
</svg>

<nav>
    <div class="logo" onclick="showPage('home')">
        <svg class="icon"><use href="#icon-home"></use></svg> Spinogrizik
    </div>
    <div id="navProfile" style="display: flex; gap: 10px;"></div>
</nav>

<div id="toast" class="toast"><svg class="icon icon-sm"><use href="#icon-check"></use></svg> <span id="toastMsg">Успешно!</span></div>

<!-- ЛЕНТА ПРОМПТОВ -->
<div id="home" class="page active">
    <div class="sort-tabs">
        <div class="sort-tab active" onclick="sortFeed('new')"><svg class="icon icon-sm"><use href="#icon-edit"></use></svg> Новые</div>
        <div class="sort-tab" onclick="sortFeed('likes')"><svg class="icon icon-sm"><use href="#icon-heart"></use></svg> Популярные</div>
        <div class="sort-tab" onclick="sortFeed('copies')"><svg class="icon icon-sm"><use href="#icon-copy"></use></svg> Полезные</div>
    </div>
    <div id="postsList"></div>
</div>

<!-- СТРАНИЦА ОДНОГО ПРОМПТА -->
<div id="postDetail" class="page">
    <div class="header-back" onclick="showPage('home')"><svg class="icon"><use href="#icon-back"></use></svg> Назад в ленту</div>
    <div id="postContent"></div>
</div>

<!-- ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ -->
<div id="profile" class="page">
    <div class="header-back" onclick="showPage('home')"><svg class="icon"><use href="#icon-back"></use></svg> В ленту</div>
    <div id="profileContent"></div>
</div>

<!-- ПУБЛИКАЦИЯ -->
<div id="publish" class="page">
    <div class="card">
        <h2 id="pubTitle" style="margin-top:0;">Опубликовать промпт</h2>
        <input id="p_model" placeholder="Имя модели (напр. ChatGPT)">
        <input id="p_nn" placeholder="Название нейросети (напр. OpenAI)">
        <textarea id="p_text" placeholder="Введите ваш промпт..." style="height: 180px;"></textarea>
        <label style="font-size: 0.85em; color: var(--text-muted); margin-bottom: 8px; display: block;">Картинка (необязательно):</label>
        <input type="file" id="p_image" accept="image/*" style="padding: 10px;">
        <button onclick="savePost()" style="margin-top: 10px;" id="pubBtn"><svg class="icon"><use href="#icon-plus"></use></svg> Опубликовать</button>
    </div>
</div>

<!-- АВТОРИЗАЦИЯ -->
<div id="auth" class="page">
    <div class="card" style="max-width: 400px; margin: 0 auto;">
        <div class="sort-tabs" style="margin-bottom: 20px;">
            <div class="sort-tab active" id="tabLogin" onclick="switchAuth('login')" style="flex:1; justify-content:center;">Вход</div>
            <div class="sort-tab" id="tabReg" onclick="switchAuth('reg')" style="flex:1; justify-content:center;">Регистрация</div>
        </div>
        <div id="authForms"></div>
        <div style="display:flex; align-items:center; gap:15px; margin:20px 0; background:rgba(0,0,0,0.4); padding:10px; border-radius:14px;">
            <canvas id="captchaCanvas" width="110" height="40" onclick="genCaptcha()" style="border-radius: 8px; background: #fff; cursor: pointer;"></canvas>
            <input id="captchaInput" placeholder="Код проверки" style="margin:0; background: transparent; border:none; padding:10px;">
        </div>
        <button id="authBtn" onclick="processAuth()">Продолжить</button>
    </div>
</div>

<!-- ВЕРИФИКАЦИЯ -->
<div id="verify" class="page">
    <div class="card" style="max-width: 400px; margin: 0 auto;">
        <h2 style="margin-top:0;">Подтверждение Email</h2>
        <p style="color: var(--text-muted); font-size: 0.9em;">Код отправлен на вашу почту.</p>
        <input id="v_code" type="number" placeholder="6-значный код">
        <button onclick="verifyCode()">Подтвердить</button>
    </div>
</div>

<script>
    // ================= НАСТРОЙКИ КЛЮЧЕЙ =================
    const GITHUB_TOKEN = "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"; 
    const EMAILJS_PUBLIC_KEY = "kTfs9-_qPr1PSracH";
    const REPO = "SITEspinogrz/spinogrizik";

    if(EMAILJS_PUBLIC_KEY && EMAILJS_PUBLIC_KEY !== "ТВОЙ_PUBLIC_KEY") emailjs.init(EMAILJS_PUBLIC_KEY); 
    // ====================================================

    // БАЗА ДАННЫХ
    let currentUser = JSON.parse(localStorage.getItem('currentUser')); 
    let usersDB = JSON.parse(localStorage.getItem('usersDB') || '[]'); 
    let posts = JSON.parse(localStorage.getItem('posts') || '[]');

    let currentSort = 'new';
    let editPostId = null; 
    let captchaCode = "";
    let authMode = 'login';
    let tempAuth = null;
    let expectedCode = "";

    // ОБНОВЛЕНИЕ ДАННЫХ ЮЗЕРА (С защитой от пустых массивов)
    function syncUser() {
        if(!currentUser) return;
        if(!currentUser.following) currentUser.following = [];
        if(!currentUser.followers) currentUser.followers = [];
        if(!currentUser.favorites) currentUser.favorites = [];
        
        let idx = usersDB.findIndex(u => u.name === currentUser.name);
        if(idx > -1) { usersDB[idx] = currentUser; } 
        else { usersDB.push(currentUser); } // На случай бага сохранения
        
        localStorage.setItem('usersDB', JSON.stringify(usersDB));
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
    }

    // УВЕДОМЛЕНИЯ
    function toast(msg, isError = false) {
        const t = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = msg;
        t.style.background = isError ? "rgba(231, 76, 60, 0.9)" : "rgba(46, 204, 113, 0.9)";
        t.classList.add('show'); 
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // НАВИГАЦИЯ
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'home') sortFeed(currentSort);
        window.scrollTo(0, 0);
    }

    function initNav() {
        const nav = document.getElementById('navProfile');
        if (currentUser) {
            syncUser(); // Проверяем структуру профиля
            nav.innerHTML = `
                <button class="btn-small btn-outline" onclick="openProfile('${currentUser.name}')"><svg class="icon"><use href="#icon-user"></use></svg> <span style="display:none; @media(min-width:400px){display:inline;}">${currentUser.name}</span></button>
                <button class="btn-small" onclick="openPublish()"><svg class="icon"><use href="#icon-plus"></use></svg> Пост</button>
            `;
        } else {
            nav.innerHTML = `<button class="btn-small" onclick="openAuth()"><svg class="icon"><use href="#icon-user"></use></svg> Войти</button>`;
        }
    }

    // АВТОРИЗАЦИЯ
    function openAuth() { showPage('auth'); switchAuth('login'); genCaptcha(); }
    
    function switchAuth(mode) {
        authMode = mode;
        document.querySelectorAll('#auth .sort-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(mode === 'login' ? 'tabLogin' : 'tabReg').classList.add('active');
        document.getElementById('authForms').innerHTML = mode === 'login' 
            ? `<input id="a_email" type="email" placeholder="Email"><input id="a_pass" type="password" placeholder="Пароль">`
            : `<input id="a_name" type="text" placeholder="Уникальный Никнейм"><input id="a_email" type="email" placeholder="Email"><input id="a_pass" type="password" placeholder="Пароль">`;
        document.getElementById('authBtn').innerHTML = mode === 'login' ? 'Войти' : 'Создать аккаунт';
        genCaptcha();
    }
    
    function genCaptcha() {
        const ctx = document.getElementById('captchaCanvas').getContext('2d');
        ctx.clearRect(0,0,110,40); 
        captchaCode = Math.random().toString(36).substring(2,7).toUpperCase();
        ctx.font = "bold 22px Courier New"; ctx.fillStyle = "#2c3e50"; 
        ctx.setTransform(1, Math.random()*0.2-0.1, Math.random()*0.2-0.1, 1, 0, 0);
        ctx.fillText(captchaCode, 15, 28);
        ctx.setTransform(1,0,0,1,0,0);
        
        // Шум
        for(let i=0; i<15; i++) {
            ctx.fillStyle = `rgba(0,0,0,0.1)`; ctx.beginPath();
            ctx.arc(Math.random()*110, Math.random()*40, Math.random()*3, 0, Math.PI*2); ctx.fill();
        }
    }

    async function processAuth() {
        const email = document.getElementById('a_email').value.trim();
        const pass = document.getElementById('a_pass').value.trim();
        if(document.getElementById('captchaInput').value.toUpperCase() !== captchaCode) return toast("Неверный код с картинки!", true), genCaptcha();
        
        if(authMode === 'reg') {
            const name = document.getElementById('a_name').value.trim();
            if(!name || !email || !pass) return toast("Заполните все поля", true);
            if(usersDB.find(u => u.email === email || u.name === name)) return toast("Email или Ник уже заняты", true);
            // ИНИЦИАЛИЗАЦИЯ ПУСТЫХ МАССИВОВ ПРИ РЕГИСТРАЦИИ!
            tempAuth = { name, email, pass, followers:[], following:[], favorites:[] };
        } else {
            tempAuth = usersDB.find(u => u.email === email && u.pass === pass);
            if(!tempAuth) return toast("Неверный Email или Пароль", true);
        }

        expectedCode = Math.floor(100000 + Math.random() * 900000).toString();
        try {
            document.getElementById('authBtn').innerText = "Отправка...";
            await emailjs.send("service_bpp4tkr", "template_fskbb8q", { to_email: email, code: expectedCode });
            toast("Код отправлен на почту!"); showPage('verify');
        } catch(e) {
            toast("Тестовый режим. Ваш код: " + expectedCode); showPage('verify');
        } finally { document.getElementById('authBtn').innerText = "Продолжить"; }
    }

    function verifyCode() {
        if(document.getElementById('v_code').value !== expectedCode) return toast("Неверный код", true);
        if(authMode === 'reg') { 
            usersDB.push(tempAuth); 
            localStorage.setItem('usersDB', JSON.stringify(usersDB)); 
        }
        currentUser = tempAuth; 
        syncUser(); // Убеждаемся, что массивы созданы
        toast("Вход выполнен успешно!"); 
        initNav(); 
        showPage('home');
    }
    
    function doLogout() { currentUser = null; localStorage.removeItem('currentUser'); initNav(); showPage('home'); toast("Вы вышли из аккаунта"); }

    // ЛЕНТА
    function sortFeed(type) {
        currentSort = type;
        document.querySelectorAll('#home .sort-tab').forEach(t => t.classList.remove('active'));
        event?.currentTarget?.classList.add('active');

        let sorted = [...posts];
        if(type === 'new') sorted.sort((a,b) => b.id - a.id);
        if(type === 'likes') sorted.sort((a,b) => (b.likes?.length||0) - (a.likes?.length||0));
        if(type === 'copies') sorted.sort((a,b) => (b.copies||0) - (a.copies||0));

        const list = document.getElementById('postsList');
        list.innerHTML = sorted.length ? '' : '<div class="card" style="text-align:center; color: var(--text-muted);">Здесь пока пусто. Создайте первый промпт!</div>';
        
        sorted.forEach(p => {
            if(!p.likes) p.likes = []; // Защита от старых данных
            list.innerHTML += `
                <div class="card mini-card" onclick="openPost(${p.id})">
                    <h3 style="margin:0 0 12px 0; font-size:1.2em;">${p.model} <span class="tag">${p.nn}</span></h3>
                    <div class="meta-info">
                        <span class="user-link"><svg class="icon icon-sm"><use href="#icon-user"></use></svg> ${p.author}</span>
                        <span style="display:flex; align-items:center; gap:4px;"><svg class="icon icon-sm"><use href="#icon-heart"></use></svg> ${p.likes.length}</span>
                        <span style="display:flex; align-items:center; gap:4px;"><svg class="icon icon-sm"><use href="#icon-copy"></use></svg> ${p.copies || 0}</span>
                        <span style="margin-left:auto;">${p.time.split(',')[0]}</span>
                    </div>
                </div>
            `;
        });
    }

    // СТРАНИЦА ПРОМПТА
    function openPost(id) {
        const p = posts.find(x => x.id === id);
        if(!p) return;
        
        // Защита данных
        if(!p.likes) p.likes = [];
        if(!p.comments) p.comments = [];
        if(currentUser) syncUser(); // Обновляем данные юзера перед проверками
        
        const isLiked = currentUser && p.likes.includes(currentUser.name) ? 'active' : '';
        const isFav = currentUser && currentUser.favorites && currentUser.favorites.includes(p.id) ? 'active' : '';
        const isAuthor = currentUser && currentUser.name === p.author;

        let html = `
            <div class="card" style="margin-top:0;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
                    <span class="user-link" onclick="openProfile('${p.author}')"><svg class="icon"><use href="#icon-user"></use></svg> ${p.author}</span>
                    <span style="opacity:0.6; font-size:0.8em;">${p.time}</span>
                </div>
                <h2 style="margin: 0 0 15px 0;">${p.model} <span class="tag">${p.nn}</span></h2>
                
                <div class="prompt-box">
                    <button class="copy-btn btn-outline" onclick="doCopy(${p.id})"><svg class="icon icon-sm"><use href="#icon-copy"></use></svg> Копировать</button>
                    <pre class="prompt-text">${p.text}</pre>
                </div>
                ${p.image ? `<img src="${p.image}" class="post-img">` : ''}
                
                <div class="actions-bar">
                    <button class="action-btn btn-small ${isLiked}" onclick="toggleLike(${p.id})"><svg class="icon"><use href="#icon-heart"></use></svg> ${p.likes.length}</button>
                    <button class="action-btn btn-small ${isFav}" onclick="toggleFav(${p.id})"><svg class="icon"><use href="#icon-star"></use></svg> Сохранить</button>
                    ${isAuthor ? `
                        <button class="action-btn btn-small" onclick="editPost(${p.id})" style="margin-left:auto;"><svg class="icon"><use href="#icon-edit"></use></svg></button>
                        <button class="action-btn btn-small btn-danger" onclick="deletePost(${p.id})"><svg class="icon"><use href="#icon-trash"></use></svg></button>
                    ` : ''}
                </div>

                <div class="comments-list">
                    <h4 style="margin-top:0;">Комментарии (${p.comments.length})</h4>
                    ${p.comments.map(c => `
                        <div class="comment">
                            <strong class="user-link" onclick="openProfile('${c.author}')" style="display:inline-flex; margin-bottom:5px;">${c.author}</strong><br>
                            ${c.text} 
                            <div style="font-size:0.7em; color:var(--text-muted); margin-top:6px;">${c.time}</div>
                        </div>`).join('')}
                    
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <input id="c_txt_${p.id}" placeholder="Ваш комментарий..." style="margin:0;">
                        <button class="btn-small" onclick="addComment(${p.id})">Отправить</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('postContent').innerHTML = html;
        showPage('postDetail');
    }

    // ДЕЙСТВИЯ
    function doCopy(id) {
        let p = posts.find(x => x.id === id);
        navigator.clipboard.writeText(p.text);
        p.copies = (p.copies || 0) + 1;
        localStorage.setItem('posts', JSON.stringify(posts));
        toast("Скопировано в буфер обмена!");
        openPost(id); 
    }

    function toggleLike(id) {
        if(!currentUser) return toast("Войдите в аккаунт", true);
        let p = posts.find(x => x.id === id);
        let idx = p.likes.indexOf(currentUser.name);
        if(idx > -1) p.likes.splice(idx, 1); else p.likes.push(currentUser.name);
        localStorage.setItem('posts', JSON.stringify(posts)); openPost(id);
    }

    function toggleFav(id) {
        if(!currentUser) return toast("Войдите в аккаунт", true);
        let idx = currentUser.favorites.indexOf(id);
        if(idx > -1) currentUser.favorites.splice(idx, 1); else currentUser.favorites.push(id);
        syncUser(); openPost(id); toast(idx > -1 ? "Удалено из сохраненного" : "Добавлено в сохраненное");
    }

    function addComment(id) {
        if(!currentUser) return toast("Войдите в аккаунт", true);
        let txt = document.getElementById(`c_txt_${id}`).value.trim();
        if(!txt) return;
        posts.find(x => x.id === id).comments.push({ author: currentUser.name, text: txt, time: new Date().toLocaleString() });
        localStorage.setItem('posts', JSON.stringify(posts)); openPost(id);
    }

    function deletePost(id) {
        if(!confirm("Удалить этот промпт навсегда?")) return;
        posts = posts.filter(p => p.id !== id);
        localStorage.setItem('posts', JSON.stringify(posts));
        toast("Промпт удален");
        showPage('home');
    }

    // ПРОФИЛЬ
    function openProfile(username) {
        let targetUser = usersDB.find(u => u.name === username) || (currentUser && currentUser.name === username ? currentUser : null);
        if(!targetUser) return toast("Пользователь не найден", true);
        
        let isMe = currentUser && currentUser.name === username;
        let isFollowing = currentUser && currentUser.following && currentUser.following.includes(username);
        
        let userPosts = posts.filter(p => p.author === username);
        let favPosts = isMe && currentUser.favorites ? posts.filter(p => currentUser.favorites.includes(p.id)) : [];

        let html = `
            <div class="card" style="text-align: center; padding: 30px 20px;">
                <div style="background: rgba(255,255,255,0.1); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto;">
                    <svg class="icon" style="width: 40px; height: 40px;"><use href="#icon-user"></use></svg>
                </div>
                <h2 style="margin: 0 0 15px 0;">${username}</h2>
                <div style="display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; color: var(--text-muted);">
                    <div style="text-align:center;"><strong style="color:white; font-size:1.2em;">${userPosts.length}</strong><br>Постов</div>
                    <div style="text-align:center;"><strong style="color:white; font-size:1.2em;">${targetUser.followers?.length||0}</strong><br>Подписчиков</div>
                </div>
                ${!isMe && currentUser ? `<button class="${isFollowing ? 'btn-outline' : ''}" style="max-width:200px; margin: 0 auto;" onclick="toggleFollow('${username}')">${isFollowing ? 'Отписаться' : 'Подписаться'}</button>` : ''}
                ${isMe ? `<button class="btn-outline btn-danger" style="max-width:200px; margin: 0 auto;" onclick="doLogout()">Выйти из аккаунта</button>` : ''}
            </div>
            
            <h3 style="margin-left: 10px;">Промпты автора</h3>
            <div>${renderMiniList(userPosts)}</div>
            
            ${isMe && favPosts.length ? `<h3 style="margin-left: 10px;">Сохраненное</h3><div>${renderMiniList(favPosts)}</div>` : ''}
        `;
        document.getElementById('profileContent').innerHTML = html;
        showPage('profile');
    }

    function toggleFollow(username) {
        let target = usersDB.find(u => u.name === username);
        if(!target) return;
        
        let idx = currentUser.following.indexOf(username);
        if(idx > -1) {
            currentUser.following.splice(idx, 1);
            if(target.followers) target.followers = target.followers.filter(n => n !== currentUser.name);
        } else {
            currentUser.following.push(username);
            if(!target.followers) target.followers = [];
            target.followers.push(currentUser.name);
        }
        syncUser();
        let tIdx = usersDB.findIndex(u => u.name === username);
        usersDB[tIdx] = target; localStorage.setItem('usersDB', JSON.stringify(usersDB));
        openProfile(username);
    }

    function renderMiniList(arr) {
        if(!arr.length) return `<div class="card" style="text-align:center; color: var(--text-muted);">Здесь пусто</div>`;
        return arr.map(p => `
            <div class="card mini-card" onclick="openPost(${p.id})" style="padding: 15px;">
                <h4 style="margin:0 0 8px 0;">${p.model}</h4>
                <div style="font-size:0.8em; color:var(--text-muted); display:flex; gap:10px;">
                    <span style="display:flex; align-items:center; gap:4px;"><svg class="icon icon-sm"><use href="#icon-heart"></use></svg> ${p.likes?.length||0}</span>
                    <span style="display:flex; align-items:center; gap:4px;"><svg class="icon icon-sm"><use href="#icon-copy"></use></svg> ${p.copies||0}</span>
                </div>
            </div>
        `).join('');
    }

    // ПУБЛИКАЦИЯ
    function openPublish() {
        editPostId = null;
        document.getElementById('pubTitle').innerText = "Опубликовать промпт";
        document.getElementById('pubBtn').innerHTML = `<svg class="icon"><use href="#icon-plus"></use></svg> Опубликовать`;
        document.getElementById('p_model').value = ''; document.getElementById('p_nn').value = ''; document.getElementById('p_text').value = '';
        showPage('publish');
    }

    function editPost(id) {
        let p = posts.find(x => x.id === id);
        if(!p || p.author !== currentUser.name) return;
        editPostId = id;
        document.getElementById('pubTitle').innerText = "Редактирование";
        document.getElementById('pubBtn').innerHTML = `<svg class="icon"><use href="#icon-edit"></use></svg> Сохранить`;
        document.getElementById('p_model').value = p.model; document.getElementById('p_nn').value = p.nn; document.getElementById('p_text').value = p.text;
        showPage('publish');
    }

    async function savePost() {
        let m = document.getElementById('p_model').value.trim(), nn = document.getElementById('p_nn').value.trim(), txt = document.getElementById('p_text').value.trim();
        if(!m || !txt) return toast("Заполните название и текст", true);
        
        let file = document.getElementById('p_image').files[0];
        let imgBase64 = null;
        if(file) {
            if(file.size > 2*1024*1024) return toast("Картинка больше 2МБ", true);
            imgBase64 = await new Promise(r => { let rd = new FileReader(); rd.onload=()=>r(rd.result); rd.readAsDataURL(file); });
        }

        if(editPostId) {
            let p = posts.find(x => x.id === editPostId);
            p.model = m; p.nn = nn; p.text = txt; if(imgBase64) p.image = imgBase64;
            toast("Изменения сохранены!");
            openPost(editPostId);
        } else {
            posts.unshift({ id: Date.now(), author: currentUser.name, model: m, nn: nn, text: txt, image: imgBase64, likes: [], comments: [], copies: 0, time: new Date().toLocaleString() });
            toast("Промпт опубликован!");
            showPage('home');
        }
        localStorage.setItem('posts', JSON.stringify(posts));
    }

    // СТАРТ
    initNav();
    showPage('home');
</script>

</body>
</html>
