<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spinogrizik Network</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.15); --accent: #6c5ce7; --accent-hover: #8172fa; --bg-dark: rgba(0,0,0,0.3); }
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: url('https://img.freepik.com/free-vector/wave-dark-gradient-background-desogn_343694-4095.jpg') no-repeat center center fixed; background-size: cover; color: white; min-height: 100dvh; display: flex; flex-direction: column; -webkit-tap-highlight-color: transparent; }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        nav { background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--glass-border); }
        .logo { font-size: 1.6em; font-weight: 900; cursor: pointer; letter-spacing: 1px; color: #fff; }
        
        .page { display: none; padding: 20px 15px; flex: 1; max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        
        .card { background: var(--glass); backdrop-filter: blur(16px); padding: 20px; margin-bottom: 20px; border-radius: 20px; border: 1px solid var(--glass-border); }
        
        /* Мини-карточка в ленте */
        .mini-card { cursor: pointer; transition: 0.2s; padding: 15px 20px; }
        .mini-card:hover { background: rgba(255,255,255,0.12); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .tag { font-size: 0.7em; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 12px; margin-left: 8px; font-weight: normal; }
        .meta-info { font-size: 0.85em; opacity: 0.7; display: flex; gap: 15px; margin-top: 10px; align-items: center; }
        .user-link { color: #a29bfe; cursor: pointer; font-weight: bold; text-decoration: none; }
        .user-link:hover { text-decoration: underline; }

        input, textarea { width: 100%; padding: 14px; margin: 8px 0 15px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: var(--bg-dark); color: white; box-sizing: border-box; font-family: inherit; font-size: 1em; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); }
        
        button { background: var(--accent); color: white; padding: 14px 20px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1em; transition: 0.2s; width: 100%; }
        button:hover { background: var(--accent-hover); }
        .btn-small { width: auto; padding: 8px 16px; font-size: 0.9em; border-radius: 10px; margin: 0; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-outline:hover { background: var(--accent); color: white; }

        /* Профиль */
        .profile-header { text-align: center; padding: 30px 20px; background: rgba(0,0,0,0.4); border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--glass-border); }
        .profile-avatar { font-size: 4em; margin-bottom: 10px; }
        .stats { display: flex; justify-content: center; gap: 20px; margin: 15px 0; font-size: 0.9em; opacity: 0.9; }
        
        /* Сортировка (Топ/Новые) */
        .sort-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .sort-tab { background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 15px; cursor: pointer; white-space: nowrap; font-size: 0.9em; border: 1px solid transparent; }
        .sort-tab.active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); font-weight: bold; }

        /* Внутри промпта */
        .prompt-box { position: relative; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.05); }
        .prompt-text { white-space: pre-wrap; margin: 0; font-family: monospace; font-size: 0.95em; line-height: 1.6; color: #e2e8f0; }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: var(--accent); width: auto; padding: 5px 12px; font-size: 0.8em; }
        .post-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px; margin-top: 15px; }
        .actions-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .action-btn { background: rgba(255,255,255,0.1); width: auto; padding: 10px 15px; border-radius: 12px; display: flex; align-items: center; gap: 5px; }
        .action-btn.active { background: var(--accent); }

        .comments-list { margin-top: 20px; }
        .comment { background: var(--bg-dark); padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 0.9em; }

        .toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #2ecc71; color: white; padding: 12px 25px; border-radius: 30px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.4s; z-index: 1000; }
        .toast.show { bottom: 30px; }
        
        .header-back { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; cursor: pointer; color: #a29bfe; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="showPage('home')">Spinogrizik</div>
    <div id="navProfile" style="display: flex; gap: 10px;"></div>
</nav>

<div id="toast" class="toast">Успешно!</div>

<!-- ЛЕНТА ПРОМПТОВ -->
<div id="home" class="page active">
    <div class="sort-tabs">
        <div class="sort-tab active" onclick="sortFeed('new')">🔥 Новые</div>
        <div class="sort-tab" onclick="sortFeed('likes')">❤️ Топ по лайкам</div>
        <div class="sort-tab" onclick="sortFeed('copies')">📋 Топ по копированиям</div>
    </div>
    <div id="postsList"></div>
</div>

<!-- СТРАНИЦА ОДНОГО ПРОМПТА -->
<div id="postDetail" class="page">
    <div class="header-back" onclick="showPage('home')">← Назад в ленту</div>
    <div id="postContent"></div>
</div>

<!-- ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ -->
<div id="profile" class="page">
    <div class="header-back" onclick="showPage('home')">← В ленту</div>
    <div id="profileContent"></div>
</div>

<!-- ПУБЛИКАЦИЯ -->
<div id="publish" class="page">
    <div class="card">
        <h2 id="pubTitle" style="margin-top:0;">Опубликовать промпт</h2>
        <input id="p_model" placeholder="Имя модели (напр. Gemini 3.1)">
        <input id="p_nn" placeholder="Название нейросети">
        <textarea id="p_text" placeholder="Введите ваш промпт..." style="height: 150px;"></textarea>
        <label style="font-size: 0.9em; opacity: 0.8; margin-bottom: 5px; display: block;">Картинка (опционально):</label>
        <input type="file" id="p_image" accept="image/*">
        <button onclick="savePost()" style="margin-top: 10px;" id="pubBtn">🚀 Опубликовать</button>
    </div>
</div>

<!-- АВТОРИЗАЦИЯ -->
<div id="auth" class="page">
    <div class="card" style="max-width: 400px; margin: 0 auto;">
        <div class="sort-tabs" style="margin-bottom: 15px;">
            <div class="sort-tab active" id="tabLogin" onclick="switchAuth('login')" style="flex:1; text-align:center;">Вход</div>
            <div class="sort-tab" id="tabReg" onclick="switchAuth('reg')" style="flex:1; text-align:center;">Регистрация</div>
        </div>
        <div id="authForms"></div>
        <div style="display:flex; gap:10px; margin:15px 0; background:rgba(0,0,0,0.3); padding:10px; border-radius:12px;">
            <canvas id="captchaCanvas" width="100" height="40" onclick="genCaptcha()"></canvas>
            <input id="captchaInput" placeholder="Код с картинки" style="margin:0;">
        </div>
        <button id="authBtn" onclick="processAuth()">Продолжить</button>
    </div>
</div>

<!-- ВЕРИФИКАЦИЯ -->
<div id="verify" class="page">
    <div class="card" style="max-width: 400px; margin: 0 auto;">
        <h2>Подтверждение Email</h2>
        <input id="v_code" type="number" placeholder="6-значный код с почты">
        <button onclick="verifyCode()">Подтвердить</button>
    </div>
</div>

<script>
    // ================= НАСТРОЙКИ КЛЮЧЕЙ =================
    const GITHUB_TOKEN = "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"; 
    const EMAILJS_PUBLIC_KEY = "kTfs9-_qPr1PSracH";
    const REPO = "SITEspinogrz/spinogrizik";

    if(EMAILJS_PUBLIC_KEY && EMAILJS_PUBLIC_KEY !== "ТВОЙ_PUBLIC_KEY") emailjs.init(EMAILJS_PUBLIC_KEY); 
    // ====================================================

    // БАЗА ДАННЫХ
    let currentUser = JSON.parse(localStorage.getItem('currentUser')); 
    let usersDB = JSON.parse(localStorage.getItem('usersDB') || '[]'); 
    let posts = JSON.parse(localStorage.getItem('posts') || '[]');

    let currentSort = 'new';
    let editPostId = null; 
    let captchaCode = "";
    let authMode = 'login';
    let tempAuth = null;
    let expectedCode = "";

    // ОБНОВЛЕНИЕ ДАННЫХ ЮЗЕРА
    function syncUser() {
        if(!currentUser) return;
        let idx = usersDB.findIndex(u => u.name === currentUser.name);
        if(idx > -1) {
            usersDB[idx] = currentUser;
            localStorage.setItem('usersDB', JSON.stringify(usersDB));
        }
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
    }

    // УВЕДОМЛЕНИЯ
    function toast(msg, bg = "#2ecc71") {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.background = bg;
        t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
    }

    // НАВИГАЦИЯ
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'home') sortFeed(currentSort);
        window.scrollTo(0, 0);
    }

    function initNav() {
        const nav = document.getElementById('navProfile');
        if (currentUser) {
            // Проверяем структуру старых аккаунтов
            if(!currentUser.following) currentUser.following = [];
            if(!currentUser.followers) currentUser.followers = [];
            if(!currentUser.favorites) currentUser.favorites = [];
            syncUser();

            nav.innerHTML = `
                <button class="btn-small btn-outline" onclick="openProfile('${currentUser.name}')">👤 ${currentUser.name}</button>
                <button class="btn-small" onclick="openPublish()">➕ Пост</button>
            `;
        } else {
            nav.innerHTML = `<button class="btn-small" onclick="openAuth()">Войти</button>`;
        }
    }

    // АВТОРИЗАЦИЯ
    function openAuth() { showPage('auth'); switchAuth('login'); genCaptcha(); }
    function switchAuth(mode) {
        authMode = mode;
        document.querySelectorAll('#auth .sort-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(mode === 'login' ? 'tabLogin' : 'tabReg').classList.add('active');
        document.getElementById('authForms').innerHTML = mode === 'login' 
            ? `<input id="a_email" type="email" placeholder="Email"><input id="a_pass" type="password" placeholder="Пароль">`
            : `<input id="a_name" type="text" placeholder="Никнейм"><input id="a_email" type="email" placeholder="Email"><input id="a_pass" type="password" placeholder="Пароль">`;
        document.getElementById('authBtn').innerText = mode === 'login' ? 'Войти' : 'Регистрация';
        genCaptcha();
    }
    function genCaptcha() {
        const ctx = document.getElementById('captchaCanvas').getContext('2d');
        ctx.clearRect(0,0,100,40); ctx.fillStyle = "#fff"; ctx.fillRect(0,0,100,40);
        captchaCode = Math.random().toString(36).substring(2,7).toUpperCase();
        ctx.font = "bold 20px Arial"; ctx.fillStyle = "#000"; ctx.fillText(captchaCode, 15, 28);
    }
    async function processAuth() {
        const email = document.getElementById('a_email').value.trim();
        const pass = document.getElementById('a_pass').value.trim();
        if(document.getElementById('captchaInput').value.toUpperCase() !== captchaCode) return toast("Неверная капча!", "#e74c3c"), genCaptcha();
        
        if(authMode === 'reg') {
            const name = document.getElementById('a_name').value.trim();
            if(!name || !email || !pass) return toast("Заполните всё", "#e74c3c");
            if(usersDB.find(u => u.email === email || u.name === name)) return toast("Email или Ник занят", "#e74c3c");
            tempAuth = { name, email, pass, followers:[], following:[], favorites:[] };
        } else {
            tempAuth = usersDB.find(u => u.email === email && u.pass === pass);
            if(!tempAuth) return toast("Неверные данные", "#e74c3c");
        }

        expectedCode = Math.floor(100000 + Math.random() * 900000).toString();
        try {
            document.getElementById('authBtn').innerText = "Отправка...";
            await emailjs.send("service_bpp4tkr", "template_fskbb8q", { to_email: email, code: expectedCode });
            toast("Код отправлен!"); showPage('verify');
        } catch(e) {
            toast("Режим без Email. Код: " + expectedCode, "#f39c12"); showPage('verify');
        } finally { document.getElementById('authBtn').innerText = "Продолжить"; }
    }
    function verifyCode() {
        if(document.getElementById('v_code').value !== expectedCode) return toast("Неверный код", "#e74c3c");
        if(authMode === 'reg') { usersDB.push(tempAuth); localStorage.setItem('usersDB', JSON.stringify(usersDB)); }
        currentUser = tempAuth; syncUser();
        toast("Вход выполнен!"); initNav(); showPage('home');
    }
    function doLogout() { currentUser = null; localStorage.removeItem('currentUser'); initNav(); showPage('home'); toast("Вы вышли"); }

    // ЛЕНТА (Окошки)
    function sortFeed(type) {
        currentSort = type;
        document.querySelectorAll('#home .sort-tab').forEach(t => t.classList.remove('active'));
        event?.currentTarget?.classList.add('active');

        let sorted = [...posts];
        if(type === 'new') sorted.sort((a,b) => b.id - a.id);
        if(type === 'likes') sorted.sort((a,b) => (b.likes?.length||0) - (a.likes?.length||0));
        if(type === 'copies') sorted.sort((a,b) => (b.copies||0) - (a.copies||0));

        const list = document.getElementById('postsList');
        list.innerHTML = sorted.length ? '' : '<div class="card" style="text-align:center;">Пока пусто.</div>';
        
        sorted.forEach(p => {
            if(!p.likes) p.likes = []; // Фикс старых постов
            list.innerHTML += `
                <div class="card mini-card" onclick="openPost(${p.id})">
                    <h3 style="margin:0 0 10px 0;">${p.model} <span class="tag">${p.nn}</span></h3>
                    <div class="meta-info">
                        <span onclick="event.stopPropagation(); openProfile('${p.author}')" class="user-link">👤 ${p.author}</span>
                        <span>👍 ${p.likes.length}</span>
                        <span>📋 ${p.copies || 0}</span>
                        <span style="margin-left:auto;">${p.time.split(',')[0]}</span>
                    </div>
                </div>
            `;
        });
    }

    // СТРАНИЦА ПРОМПТА
    function openPost(id) {
        const p = posts.find(x => x.id === id);
        if(!p) return;
        if(!p.likes) p.likes = [];
        if(!p.dislikes) p.dislikes = [];
        
        const isLiked = currentUser && p.likes.includes(currentUser.name) ? 'active' : '';
        const isDisliked = currentUser && p.dislikes.includes(currentUser.name) ? 'active' : '';
        const isFav = currentUser && currentUser.favorites.includes(p.id) ? 'active' : '';
        const isAuthor = currentUser && currentUser.name === p.author;

        let html = `
            <div class="card" style="margin-top:0;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="user-link" onclick="openProfile('${p.author}')">👤 ${p.author}</span>
                    <span style="opacity:0.6; font-size:0.8em;">${p.time}</span>
                </div>
                <h2>${p.model} <span class="tag">${p.nn}</span></h2>
                
                <div class="prompt-box">
                    <button class="copy-btn" onclick="doCopy(${p.id})">📋 Копировать</button>
                    <pre class="prompt-text">${p.text}</pre>
                </div>
                ${p.image ? `<img src="${p.image}" class="post-img">` : ''}
                
                <div class="actions-bar">
                    <button class="action-btn ${isLiked}" onclick="toggleLike(${p.id})">👍 ${p.likes.length}</button>
                    <button class="action-btn ${isDisliked}" onclick="toggleDislike(${p.id})">👎 ${p.dislikes.length}</button>
                    <button class="action-btn ${isFav}" onclick="toggleFav(${p.id})">⭐ В избранное</button>
                    ${isAuthor ? `<button class="action-btn" onclick="editPost(${p.id})" style="margin-left:auto; background:rgba(255,255,255,0.2);">✏️ Редактировать</button>` : ''}
                </div>

                <div class="comments-list">
                    <h4>Отзывы и комментарии (${p.comments.length})</h4>
                    ${p.comments.map(c => `<div class="comment"><strong><span class="user-link" onclick="openProfile('${c.author}')">${c.author}</span>:</strong> ${c.text} <div style="font-size:0.7em; opacity:0.6; margin-top:5px;">${c.time}</div></div>`).join('')}
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <input id="c_txt_${p.id}" placeholder="Написать отзыв..." style="margin:0;">
                        <button class="btn-small" onclick="addComment(${p.id})">Отправить</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('postContent').innerHTML = html;
        showPage('postDetail');
    }

    // ДЕЙСТВИЯ С ПРОМПТОМ
    function doCopy(id) {
        let p = posts.find(x => x.id === id);
        navigator.clipboard.writeText(p.text);
        p.copies = (p.copies || 0) + 1;
        localStorage.setItem('posts', JSON.stringify(posts));
        toast("📋 Скопировано!");
        openPost(id); // Обновить интерфейс
    }

    function toggleLike(id) {
        if(!currentUser) return toast("Войдите в аккаунт", "#e74c3c");
        let p = posts.find(x => x.id === id);
        let idx = p.likes.indexOf(currentUser.name);
        if(idx > -1) p.likes.splice(idx, 1);
        else { p.likes.push(currentUser.name); p.dislikes = p.dislikes.filter(n => n !== currentUser.name); }
        localStorage.setItem('posts', JSON.stringify(posts)); openPost(id);
    }

    function toggleDislike(id) {
        if(!currentUser) return toast("Войдите в аккаунт", "#e74c3c");
        let p = posts.find(x => x.id === id);
        let idx = p.dislikes.indexOf(currentUser.name);
        if(idx > -1) p.dislikes.splice(idx, 1);
        else { p.dislikes.push(currentUser.name); p.likes = p.likes.filter(n => n !== currentUser.name); }
        localStorage.setItem('posts', JSON.stringify(posts)); openPost(id);
    }

    function toggleFav(id) {
        if(!currentUser) return toast("Войдите в аккаунт", "#e74c3c");
        let idx = currentUser.favorites.indexOf(id);
        if(idx > -1) currentUser.favorites.splice(idx, 1);
        else currentUser.favorites.push(id);
        syncUser(); openPost(id); toast(idx > -1 ? "Удалено из избранного" : "Добавлено в избранное");
    }

    function addComment(id) {
        if(!currentUser) return toast("Войдите в аккаунт", "#e74c3c");
        let txt = document.getElementById(`c_txt_${id}`).value.trim();
        if(!txt) return;
        posts.find(x => x.id === id).comments.push({ author: currentUser.name, text: txt, time: new Date().toLocaleString() });
        localStorage.setItem('posts', JSON.stringify(posts)); openPost(id);
    }

    // ПРОФИЛЬ
    function openProfile(username) {
        let targetUser = usersDB.find(u => u.name === username) || (currentUser && currentUser.name === username ? currentUser : null);
        if(!targetUser) return toast("Пользователь не найден", "#e74c3c");
        
        let isMe = currentUser && currentUser.name === username;
        let isFollowing = currentUser && currentUser.following.includes(username);
        
        let userPosts = posts.filter(p => p.author === username);
        let favPosts = isMe ? posts.filter(p => currentUser.favorites.includes(p.id)) : [];

        let html = `
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <h2>${username}</h2>
                <div class="stats">
                    <div><strong>${userPosts.length}</strong><br>Промптов</div>
                    <div><strong>${targetUser.followers?.length||0}</strong><br>Подписчиков</div>
                    <div><strong>${targetUser.following?.length||0}</strong><br>Подписок</div>
                </div>
                ${!isMe && currentUser ? `<button class="${isFollowing ? 'btn-outline' : 'btn-small'}" style="max-width:200px;" onclick="toggleFollow('${username}')">${isFollowing ? 'Отписаться' : 'Подписаться'}</button>` : ''}
                ${isMe ? `<button class="btn-small btn-outline" style="max-width:200px; margin-top:10px; border-color:#e74c3c; color:#e74c3c;" onclick="doLogout()">Выйти из аккаунта</button>` : ''}
            </div>
            
            <h3>Промпты автора</h3>
            <div id="profPosts">${renderMiniList(userPosts)}</div>
            
            ${isMe && favPosts.length ? `<h3>Избранное</h3><div>${renderMiniList(favPosts)}</div>` : ''}
        `;
        document.getElementById('profileContent').innerHTML = html;
        showPage('profile');
    }

    function toggleFollow(username) {
        let target = usersDB.find(u => u.name === username);
        if(!target) return;
        
        let idx = currentUser.following.indexOf(username);
        if(idx > -1) {
            currentUser.following.splice(idx, 1);
            target.followers = target.followers.filter(n => n !== currentUser.name);
        } else {
            currentUser.following.push(username);
            if(!target.followers) target.followers = [];
            target.followers.push(currentUser.name);
        }
        syncUser();
        // Обновляем цель в БД
        let tIdx = usersDB.findIndex(u => u.name === username);
        usersDB[tIdx] = target; localStorage.setItem('usersDB', JSON.stringify(usersDB));
        openProfile(username);
    }

    function renderMiniList(arr) {
        if(!arr.length) return `<div class="card" style="text-align:center; padding:15px;">Пусто</div>`;
        return arr.map(p => `
            <div class="card mini-card" onclick="openPost(${p.id})">
                <h4 style="margin:0 0 5px 0;">${p.model}</h4>
                <div style="font-size:0.8em; opacity:0.7;">👍 ${p.likes?.length||0} | 📋 ${p.copies||0}</div>
            </div>
        `).join('');
    }

    // ПУБЛИКАЦИЯ И РЕДАКТИРОВАНИЕ
    function openPublish() {
        editPostId = null;
        document.getElementById('pubTitle').innerText = "Новый промпт";
        document.getElementById('pubBtn').innerText = "🚀 Опубликовать";
        document.getElementById('p_model').value = ''; document.getElementById('p_nn').value = ''; document.getElementById('p_text').value = '';
        showPage('publish');
    }

    function editPost(id) {
        let p = posts.find(x => x.id === id);
        if(!p || p.author !== currentUser.name) return;
        editPostId = id;
        document.getElementById('pubTitle').innerText = "Редактировать промпт";
        document.getElementById('pubBtn').innerText = "💾 Сохранить изменения";
        document.getElementById('p_model').value = p.model;
        document.getElementById('p_nn').value = p.nn;
        document.getElementById('p_text').value = p.text;
        showPage('publish');
    }

    async function savePost() {
        let m = document.getElementById('p_model').value, nn = document.getElementById('p_nn').value, txt = document.getElementById('p_text').value;
        if(!m || !txt) return toast("Заполните модель и промпт", "#e74c3c");
        
        let file = document.getElementById('p_image').files[0];
        let imgBase64 = null;
        if(file) {
            if(file.size > 2*1024*1024) return toast("Фото до 2МБ", "#e74c3c");
            imgBase64 = await new Promise(r => { let rd = new FileReader(); rd.onload=()=>r(rd.result); rd.readAsDataURL(file); });
        }

        if(editPostId) {
            let p = posts.find(x => x.id === editPostId);
            p.model = m; p.nn = nn; p.text = txt; if(imgBase64) p.image = imgBase64;
            toast("Промпт обновлен!");
            openPost(editPostId);
        } else {
            posts.unshift({ id: Date.now(), author: currentUser.name, model: m, nn: nn, text: txt, image: imgBase64, likes: [], dislikes: [], copies: 0, comments: [], time: new Date().toLocaleString() });
            toast("Опубликовано!");
            showPage('home');
        }
        localStorage.setItem('posts', JSON.stringify(posts));
    }

    // СТАРТ
    initNav();
    showPage('home');
</script>

</body>
</html>
